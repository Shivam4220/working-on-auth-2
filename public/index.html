<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth-website</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.7/axios.min.js"></script> 
    <script>
        async function signup(){
            const username=document.getElementById("username_signup").value
            const password=document.getElementById("signup_pass").value
           await axios.post("http://localhost:8080/signup",{
                
                username : username,
                password : password
            })
            alert("you are signed up  bitch");
        }
        async function signin(){
            const username=document.getElementById("username_signin").value
            const password=document.getElementById("password_signin").value
            const response=await axios.post("http://localhost:8080/signin",{
                password : password,
                username : username
            })
            localStorage.setItem("token",response.data.token);
            alert("you are signed in  bitch");
        }
        async function getuserInfo(){
             const response=await axios.get("http://localhost:8080/me",{
                headers: {
                    token : localStorage.getItem("token")
                }
             });
             document.getElementById("user_information").innerHTML="username : " + response.data.username +" Password : "+response.data.password
        }
        getuserInfo();

        function logout(){
            localStorage.removeItem("token")
        }
        window.onload = function () {
     document.getElementById("user_information").style.display = "none";
     document.getElementById("log_out").style.display = "none";
}
    </script>
</head>
<body>
    <div id="sign_up">
        SignUp
        <input id="username_signup" type="text" name="username" placeholder="Username">
        <input id="signup_pass" type="password" name="password" placeholder="password">
        <button onclick="signup()">Submit</button>
    </div>
    <div id="sign_in">
        SignIn
        <input id="username_signin"  type="text" name="username" placeholder="Username">
        <input id="password_signin" type="password" name="password" placeholder="password">
        <button onclick="signin()">Submit</button>
    </div>
    <div id="user_information">
        UserInfo
    </div>
    <div id="log_out">
        
        <button onclick="logout()">Logout</button>
    </div>
</body>
</html>
